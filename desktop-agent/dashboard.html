<!DOCTYPE html>
<html>
  <head>
    <title>NexaLink Agent Dashboard</title>
    <style>
      body {
        background-color: #060813;
        color: #f3f4f6;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
      }
      .card {
        background: rgba(10, 15, 30, 0.8);
        border: 1px solid rgba(99, 102, 241, 0.2);
        border-radius: 20px;
        padding: 30px;
        text-align: center;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
        max-width: 380px;
        width: 85%;
        backdrop-filter: blur(12px);
      }
      .logo {
        font-size: 28px;
        font-weight: 800;
        margin-bottom: 10px;
        background: linear-gradient(to right, #6366f1, #f43f5e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .status {
        font-size: 11px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        font-weight: 700;
        padding: 6px 14px;
        border-radius: 9999px;
        margin-top: 15px;
        display: inline-block;
        transition: all 0.3s ease;
      }
      .status.idle {
        background-color: rgba(99, 102, 241, 0.15);
        color: #818cf8;
        border: 1px solid rgba(99, 102, 241, 0.3);
      }
      .status.active {
        background-color: rgba(239, 68, 68, 0.15);
        color: #f87171;
        border: 1px solid rgba(239, 68, 68, 0.3);
        animation: pulse 2s infinite ease-in-out;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      .log {
        font-family: 'Courier New', Courier, monospace;
        font-size: 10px;
        color: #9ca3af;
        margin-top: 20px;
        text-align: left;
        background-color: #0b0f19;
        padding: 12px;
        border-radius: 8px;
        max-height: 100px;
        overflow-y: auto;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .log-entry {
        margin-bottom: 4px;
        word-break: break-all;
      }
      .log-entry.system { color: #6366f1; }
      .log-entry.mtls { color: #10b981; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">NexaLink Desktop</div>
      <p style="font-size: 12px; color: #9ca3af; margin: 0;">Secure Companion OS Input Capture Tunnel</p>
      <div id="status" class="status idle">Secure Tunnel: Idle</div>
      
      <div class="log">
        <div class="log-entry system">[System] Agent initialized successfully.</div>
        <div class="log-entry mtls">[mTLS] Certificates verified. Ready.</div>
        <div id="tunnel-log"></div>
      </div>
    </div>
  </body>
</html>
